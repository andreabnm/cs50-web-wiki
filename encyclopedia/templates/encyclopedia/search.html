{% extends "encyclopedia/layout.html" %}

{% block title %}
    Search
{% endblock %}

{% block body %}
    <h1>Results of: {{ query }}</h1>

    <ul>
        {% for entry in entries %}
            <li><a href={% url 'entry' entry %}>{{entry}}</a></li>
        {% empty %}
            <p>No results found.</p>
        {% endfor %}
    </ul>

{% endblock %}
